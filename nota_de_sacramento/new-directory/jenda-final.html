<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1, user-scalable=yes"/>
    <link rel="shortcut icon" type="image/x-icon" href="resources/images/favicon.ico"/>
    <link rel="shortcut icon" type="image/png" href="resources/images/favicon-16.png" sizes="16x16"/>
    <link rel="shortcut icon" type="image/png" href="resources/images/favicon-24.png" sizes="24x24"/>
    <link rel="shortcut icon" type="image/png" href="resources/images/favicon-32.png" sizes="32x32"/>
    <link rel="shortcut icon" type="image/png" href="resources/images/favicon-64.png" sizes="64x64"/>
    <title data-template="config:app-title"/>
    <meta name="description" content="De Sacramento - facsimile + parallel text"/>
    <meta name="pb-template" content="view.html"/>
    <link rel="stylesheet" href="resources/css/theme.css"/>
    <script type="module" src="pb-components-bundle.js" data-template="pages:load-components"/>
    <style>
      body {
        --pb-view-height: calc(100vh - 212px);
      }
      .three-column {
        display: grid;
        grid-template-columns: 2fr 1.5fr 1.5fr;
        gap: 2em;
        width: 100%;
        max-width: 1600px;
        padding: 0 24px;
        box-sizing: border-box;
        align-items: start;
      }
      #facs-panel {
        height: var(--pb-view-height);
        overflow-y: auto;
        border: 1px solid #ddd;
        background: #f5f5f5;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }
      #facs-img {
        max-width: 100%;
        object-fit: contain;
        display: block;
      }
      #view-edition,
      #view-translation {
        height: var(--pb-view-height);
        overflow-y: auto;
        border-left: 1px solid #e0e0e0;
        padding-left: 1em;
      }
      .content-body {
        position: relative;
        display: flex;
        justify-content: center;
      }
      .content-body pb-navigation {
        position: fixed;
        bottom: 45%;
        --paper-fab-background: #35424b;
        color: white;
      }
      .content-body pb-navigation[direction=backward] { left: 4px; }
      .content-body pb-navigation[direction=forward]  { right: 4px; }
      @media (min-width: 769px) {
        .toolbar pb-navigation { display: none; }
      }
      @media (max-width: 900px) {
        .three-column {
          grid-template-columns: 1fr;
        }
        #facs-panel {
          display: none;
        }
        #view-edition,
        #view-translation {
          border-left: none;
          padding-left: 0;
        }
      }
      #abbr-toggle {
    font-size: 0.85em;
    padding: 4px 12px;
    border: 1px solid #b8860b;
    border-radius: 3px;
    background: transparent;
    color: #b8860b;
    cursor: pointer;
}
#abbr-toggle:hover {
    background: #b8860b;
    color: white;
}

pb-view::part(footnotes) {
    font-size: 0.8em;
}

/* Metadata sidebar */
#meta-sidebar {
    position: fixed;
    top: 0;
    right: -380px;
    width: 360px;
    height: 100vh;
    background: #fff;
    border-left: 1px solid #ddd;
    box-shadow: -4px 0 16px rgba(0,0,0,0.15);
    z-index: 9999;
    overflow-y: auto;
    transition: right 0.3s ease;
    padding: 2em 1.5em;
    box-sizing: border-box;
    font-family: Georgia, serif;
}

#meta-sidebar.open {
    right: 0;
}

#meta-sidebar h2 {
    font-size: 1.1em;
    margin-top: 0;
    margin-bottom: 0.3em;
    color: #35424b;
    border-bottom: 1px solid #ddd;
    padding-bottom: 0.4em;
}

#meta-sidebar h3 {
    font-size: 0.85em;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
    margin-top: 1.4em;
    margin-bottom: 0.3em;
}

#meta-sidebar p {
    font-size: 0.9em;
    line-height: 1.6;
    color: #333;
    margin: 0 0 0.5em 0;
}

#meta-sidebar .close-btn {
    position: absolute;
    top: 1em;
    right: 1em;
    background: none;
    border: none;
    font-size: 1.3em;
    cursor: pointer;
    color: #666;
    line-height: 1;
}

#meta-sidebar .close-btn:hover {
    color: #000;
}

#meta-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.2);
    z-index: 9998;
}

#meta-overlay.open {
    display: block;
}

#meta-toggle-btn {
    position: fixed;
    top: 120px;
    right: 0;
    z-index: 9997;
    background: #35424b;
    color: white;
    border: none;
    padding: 0.6em 0.5em;
    cursor: pointer;
    font-size: 0.8em;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    letter-spacing: 0.08em;
    border-radius: 4px 0 0 4px;
    box-shadow: -2px 2px 6px rgba(0,0,0,0.2);
}

#meta-toggle-btn:hover {
    background: #4a5f6e;
}

    </style>
  </head>
  <body>
    <pb-page data-template="pages:pb-page" unresolved="unresolved">
      <pb-document id="document1" data-template="pages:pb-document"/>
      <app-drawer-layout force-narrow="force-narrow">
        <app-drawer data-template="lib:include" data-template-path="templates/drawer.html"/>
        <app-header-layout>
          <app-header slot="header" reveals="reveals" fixed="fixed" effects="waterfall">
            <app-toolbar data-template="lib:include" data-template-path="templates/menu.html"/>
            <app-toolbar data-template="lib:include" data-template-path="templates/toolbar.html"/>
           <app-toolbar>
    <button id="abbr-toggle" onclick="         var views = document.querySelectorAll('pb-view');         var active = views[0] &amp;&amp; views[0].shadowRoot &amp;&amp; views[0].shadowRoot.getElementById('abbr-style-0');         views.forEach(function(view, i) {             if (!view.shadowRoot) return;             if (!active) {                 var style = document.createElement('style');                 style.id = 'abbr-style-' + i;                 style.textContent = '.tei-abbr { display: inline !important; font-style: italic; font-size: 0.8em; color: #7a4f1e; } .tei-expan { display: none !important; }';                 view.shadowRoot.appendChild(style);             } else {                 var old = view.shadowRoot.getElementById('abbr-style-' + i);                 if (old) old.remove();             }         });         this.textContent = active ? 'Show Abbreviations' : 'Show Expansions';     ">Show Abbreviations</button>
</app-toolbar>
          </app-header>
          <pb-drawer toggle="tocToggle" class="toc" emit="toc" subscribe="transcription">
            <div class="drawer-content">
              <h3>
                                <pb-i18n key="document.contents">Contents</pb-i18n>
                            </h3>
              <pb-load id="toc" url="api/document/{doc}/contents?target=transcription&amp;icons=true" expand="expand" src="document1" subscribe="toc" load-once="load-once">
                <pb-i18n key="dialogs.loading">Loading</pb-i18n>
              </pb-load>
            </div>
          </pb-drawer>
          <section class="breadcrumbs">
            <pb-view id="title-view1" src="document1" xpath="//teiHeader/fileDesc/titleStmt/title[1]" view="single">
              <pb-param name="header" value="short"/>
            </pb-view>
          </section>
          <main class="content-body">
            <pb-navigation direction="backward" unit="page" emit="transcription" subscribe="transcription">
              <paper-fab icon="icons:chevron-left"/>
            </pb-navigation>
            <div class="three-column">

              <div id="facs-panel">
                <img id="facs-img" src="" alt="Manuscript facsimile"/>
              </div>

              <pb-view id="view-edition" src="document1" xpath="//tei:div1[@xml:lang='la']" view="page" column-separator=".tei-cb" append-footnotes="append-footnotes" subscribe="transcription" emit="transcription">
</pb-view>

<pb-view id="view-translation" src="document1" xpath="//tei:div1[@xml:lang='en']" view="page" append-footnotes="append-footnotes" subscribe="transcription">
</pb-view>

            </div>
            <pb-navigation direction="forward" unit="page" emit="transcription" subscribe="transcription">
              <paper-fab icon="icons:chevron-right"/>
            </pb-navigation>
          </main>
        </app-header-layout>
      </app-drawer-layout>
      <pb-popover subscribe="transcription" remote="remote"/>
      <!-- Info button tab on the right edge -->
<button id="meta-toggle-btn" onclick="openMetaSidebar()">ℹ Metadata</button>

<!-- Semi-transparent overlay behind the sidebar -->
<div id="meta-overlay" onclick="closeMetaSidebar()"/>

<!-- The sidebar itself -->
<div id="meta-sidebar">
    <button class="close-btn" onclick="closeMetaSidebar()">✕</button>

    <h2>Sequitur de effectibus corporis Christi</h2>

    <h3>Manuscript witnesses</h3>
    <p>
                    <hi rend="bold">K</hi> — main witness, Klosterneuburg, Augustiner-Chorherrenstift, Cod. 696, fol. 165r, 165v</p>
    <p>
                    <strong>P</strong> — variant witness, Praha, Národní knihovna České republiky, IB 16, fol. 112r, 122v</p>

    <h3>Legend</h3>
    <p>Green: quotes adapted by the author of the note</p>
    <p>Yellow: lines that appear only in <strong>P</strong>
                </p>
    
    <h3>Transcription</h3>
    <p>Jan Müller</p>
    <p>Markéta Prošková</p>

    <h3>TEI encoding</h3>
    <p>Anna Michalcová</p>

    <h3>Project</h3>
    <p>Produced within the <strong>ANTIDOTE Workshop</strong>
                    <br/>
    Klosterneuburg, 1–5 December 2025 and Bratislava, 25–29 May 2026</p>

    <h3>Language</h3>
    <p>Latin</p>

    <h3>Schema</h3>
    <p>TEI P5, tei_all</p>
</div>

    </pb-page>
    <div class="splash"/>
    <script>
      (function() {
        var BASE = 'https://raw.githubusercontent.com/FriederikeVoit/antidote-group-a/refs/heads/main/nota_de_sacramento/';

        function setFacs(facs) {
          var img = document.getElementById('facs-img');
          if (img &amp;&amp; facs) {
            img.src = BASE + encodeURIComponent(facs);
          }
        }

        function checkShadowDOM() {
          var view = document.getElementById('view-edition');
          if (!view) { return; }
          var root = view.shadowRoot || view;
          var link = root.querySelector('pb-facs-link');
          if (link) {
            var facs = link.getAttribute('facs');
            if (facs) { setFacs(facs); }
          }
        }

        ['pb-navigate', 'pb-navigate.transcription'].forEach(function(name) {
          document.addEventListener(name, function(e) {
            if (e.detail &amp;&amp; e.detail.facs) { setFacs(e.detail.facs); }
          });
        });

        ['pb-update', 'pb-update.transcription'].forEach(function(name) {
          document.addEventListener(name, function() { checkShadowDOM(); });
        });

      })();
      
          function openMetaSidebar() {
        document.getElementById('meta-sidebar').classList.add('open');
        document.getElementById('meta-overlay').classList.add('open');
    }
    
    function closeMetaSidebar() {
        document.getElementById('meta-sidebar').classList.remove('open');
        document.getElementById('meta-overlay').classList.remove('open');
}
    </script>
  </body>
</html>
